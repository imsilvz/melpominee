name: Melpominee.app Deployment
on:
  push:
    branches:
      - master

    # Publish `v1.2.3` tags as releases.
    tags:
      - v*

permissions:
  actions: read
  contents: read
  id-token: write

jobs:
  docker-build-push:
    name: Melpominee.app Build & Push
    runs-on: arc-melpominee

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Azure CLI
        run: |
          curl -sL https://aka.ms/InstallAzureCLIDeb | sudo bash

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: ACR Login
        run: az acr login -n ${{ vars.ACR_LOGIN_SERVER }} -g ${{ vars.AZURE_GROUP }}

      - name: Extract metadata (tags, labels) for Backend
        id: meta-backend
        uses: docker/metadata-action@v4
        with:
          images: ${{ vars.ACR_LOGIN_SERVER }}/melpominee/backend
          tags: |
            type=sha,prefix=sha-,format=short
            type=raw,value=latest

      - name: Extract metadata (tags, labels) for Frontend
        id: meta-frontend
        uses: docker/metadata-action@v4
        with:
          images: ${{ vars.ACR_LOGIN_SERVER }}/melpominee/frontend
          tags: |
            type=sha,prefix=sha-,format=short
            type=raw,value=latest

      - name: Build & Push Backend
        uses: docker/build-push-action@v4
        with:
          context: .
          push: true
          file: ./src/backend/Dockerfile
          tags: ${{ steps.meta-backend.outputs.tags }}
          labels: ${{ steps.meta-backend.outputs.labels }}

      - name: Build & Push Frontend
        uses: docker/build-push-action@v4
        with:
          context: .
          push: true
          file: ./src/frontend/Dockerfile
          tags: ${{ steps.meta-frontend.outputs.tags }}
          labels: ${{ steps.meta-frontend.outputs.labels }}

      - uses: azure/setup-kubectl@v4
        id: install

      - name: Gets K8s context
        uses: azure/aks-set-context@v4
        with:
            resource-group: ${{ vars.AZURE_GROUP }}
            cluster-name: ${{ vars.AZURE_CLUSTER }}
        id: login

      - name: Substitute ACR login server and image tag in manifests
        run: |
          TAG="sha-${GITHUB_SHA::7}"
          sed -i \
            -e "s|__ACR_LOGIN_SERVER__|${{ vars.ACR_LOGIN_SERVER }}|g" \
            -e "s|__IMAGE_TAG__|${TAG}|g" \
            manifests/backend/deployment.yaml \
            manifests/frontend/deployment.yaml

      - name: Deploy Backend
        uses: Azure/k8s-deploy@v5
        with:
          action: 'deploy'
          manifests: |
            manifests/backend/serviceaccount.yaml
            manifests/backend/deployment.yaml
            manifests/backend/service.yaml
            manifests/backend/httpscaledobject.yaml
          namespace: 'melpominee'

      - name: Deploy Frontend
        uses: Azure/k8s-deploy@v5
        with:
          action: 'deploy'
          manifests: |
            manifests/frontend/deployment.yaml
            manifests/frontend/service.yaml
            manifests/frontend/httpscaledobject.yaml
          namespace: 'melpominee'

      - name: Deploy Gateway
        uses: Azure/k8s-deploy@v5
        with:
          action: 'deploy'
          manifests: |
            manifests/gateway/gateway.yaml
            manifests/gateway/httproute.yaml
          namespace: 'melpominee'

      - name: Deploy KEDA ReferenceGrant
        run: |
          kubectl apply -f manifests/frontend/referencegrant.yaml