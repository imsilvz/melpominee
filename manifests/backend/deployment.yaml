apiVersion: apps/v1
kind: Deployment
metadata:
  name: melpominee-backend
  namespace: melpominee
  labels:
    app: melpominee-backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: melpominee-backend
  template:
    metadata:
      labels:
        app: melpominee-backend
        azure.workload.identity/use: "true"
    spec:
      serviceAccountName: melpominee
      volumes:
        - name: secrets-store
          csi:
            driver: secrets-store.csi.k8s.io
            readOnly: true
            volumeAttributes:
              secretProviderClass: melpominee-secrets
        - name: secret-volume
          projected:
            sources:
              - secret:
                  name: melpominee-discord
                  optional: true
              - secret:
                  name: melpominee-email
                  optional: true
              - secret:
                  name: melpominee-postgres
                  optional: true
              - secret:
                  name: melpominee-redis
                  optional: true
      initContainers:
        - name: init-secrets
          image: busybox:1.36
          command: ["sh", "-c", "echo 'Secrets mounted'"]
          volumeMounts:
            - name: secrets-store
              mountPath: /mnt/secrets-store
              readOnly: true
          resources:
            requests:
              cpu: 10m
              memory: 16Mi
            limits:
              cpu: 50m
              memory: 32Mi
      containers:
      - name: backend
        image: ghcr.io/imsilvz/melpominee-backend:master
        imagePullPolicy: Always
        ports:
        - containerPort: 8080
        resources:
          requests:
            memory: 256Mi
            cpu: 250m
          limits:
            memory: 256Mi
            cpu: 250m
        volumeMounts:
        - name: secret-volume
          mountPath: "/etc/melpominee/secrets"
          readOnly: true
      imagePullSecrets:
      - name: github-pat
