apiVersion: apps/v1
kind: Deployment
metadata:
  name: melpominee-backend
  namespace: melpominee
  labels:
    app: melpominee-backend
spec:
  selector:
    matchLabels:
      app: melpominee-backend
  template:
    metadata:
      labels:
        app: melpominee-backend
        azure.workload.identity/use: "true"
    spec:
      serviceAccountName: melpominee
      terminationGracePeriodSeconds: 40
      volumes:
        - name: secret-volume
          projected:
            sources:
              - secret:
                  name: melpominee-discord
                  optional: true
              - secret:
                  name: melpominee-email
                  optional: true
              - secret:
                  name: melpominee-postgres
                  optional: true
              - secret:
                  name: melpominee-redis
                  optional: true
      containers:
      - name: backend
        image: __ACR_LOGIN_SERVER__/melpominee/backend:__IMAGE_TAG__
        imagePullPolicy: Always
        ports:
        - containerPort: 8080
        startupProbe:
          httpGet:
            path: /api/health/startup
            port: 8080
          periodSeconds: 1
          failureThreshold: 30
          timeoutSeconds: 1
        readinessProbe:
          httpGet:
            path: /api/health/ready
            port: 8080
          periodSeconds: 1
          failureThreshold: 3
          timeoutSeconds: 2
        livenessProbe:
          httpGet:
            path: /api/health/live
            port: 8080
          periodSeconds: 10
          failureThreshold: 3
          timeoutSeconds: 2
        resources:
          requests:
            memory: 384Mi
            cpu: 200m
          limits:
            memory: 512Mi
            cpu: 1000m
        volumeMounts:
        - name: secret-volume
          mountPath: "/etc/melpominee/secrets"
          readOnly: true
