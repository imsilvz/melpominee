apiVersion: apps/v1
kind: Deployment
metadata:
  name: melpominee-backend
  namespace: melpominee
  labels:
    app: melpominee-backend
spec:
  selector:
    matchLabels:
      app: melpominee-backend
  template:
    metadata:
      labels:
        app: melpominee-backend
        azure.workload.identity/use: "true"
    spec:
      serviceAccountName: melpominee
      terminationGracePeriodSeconds: 40
      volumes:
        - name: secrets-store
          csi:
            driver: secrets-store.csi.k8s.io
            readOnly: true
            volumeAttributes:
              secretProviderClass: melpominee-secrets
        - name: secret-volume
          projected:
            sources:
              - secret:
                  name: melpominee-discord
                  optional: true
              - secret:
                  name: melpominee-email
                  optional: true
              - secret:
                  name: melpominee-postgres
                  optional: true
              - secret:
                  name: melpominee-redis
                  optional: true
      initContainers:
        - name: init-secrets
          image: busybox:1.36
          command: ["sh", "-c", "echo 'Secrets mounted'"]
          volumeMounts:
            - name: secrets-store
              mountPath: /mnt/secrets-store
              readOnly: true
          resources:
            requests:
              cpu: 10m
              memory: 16Mi
            limits:
              cpu: 50m
              memory: 32Mi
      containers:
      - name: backend
        image: __ACR_LOGIN_SERVER__/melpominee-backend:master
        imagePullPolicy: Always
        ports:
        - containerPort: 8080
        startupProbe:
          httpGet:
            path: /api/health/startup
            port: 8080
          initialDelaySeconds: 2
          periodSeconds: 2
          failureThreshold: 20
          timeoutSeconds: 1
        readinessProbe:
          httpGet:
            path: /api/health/ready
            port: 8080
          periodSeconds: 5
          failureThreshold: 3
          timeoutSeconds: 2
        livenessProbe:
          httpGet:
            path: /api/health/live
            port: 8080
          periodSeconds: 10
          failureThreshold: 3
          timeoutSeconds: 2
        resources:
          requests:
            memory: 384Mi
            cpu: 200m
          limits:
            memory: 512Mi
            cpu: 1000m
        volumeMounts:
        - name: secret-volume
          mountPath: "/etc/melpominee/secrets"
          readOnly: true
