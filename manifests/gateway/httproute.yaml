apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: melpominee
  namespace: melpominee
spec:
  parentRefs:
    - name: melpominee-gateway
      sectionName: https
  hostnames:
    - melpominee.app
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: keda-add-ons-http-interceptor-proxy
          namespace: keda
          port: 8080
